<!DOCTYPE html>
<html>
<head>
  <title>Login IoT</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: #f4f4f4;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }

    .login-box h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #0056b3;
    }

    #msg {
      text-align: center;
      margin-top: 15px;
      color: red;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Login IoT</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button type="button" onclick="login()">Ingresar</button>

  <p id="msg"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://jtawcsvmureizbwzqvhk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0YXdjc3ZtdXJlaXpid3pxdmhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjgwMjAsImV4cCI6MjA5NDQ0NDAyMH0.wm3YK_NKppT6wB7f_TwJNiEugccQWkbiNxiAn_rGGIA"
);

if (!supabaseClient || !supabaseClient.auth) {
  document.getElementById("msg").innerText = "No se pudo inicializar la librería Supabase. Revisa tu conexión o abre la página desde un servidor web.";
}

async function login() {
  if (!supabaseClient || !supabaseClient.auth) {
    document.getElementById("msg").innerText = "No se pudo iniciar sesión: Supabase no está disponible.";
    return;
  }

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    document.getElementById("msg").innerText = "Ingresa email y contraseña.";
    return;
  }

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      const message = error.message || "Error en login";
      if (message.toLowerCase().includes("invalid login credentials") || message.toLowerCase().includes("invalid email or password") || message.toLowerCase().includes("correo")) {
        document.getElementById("msg").innerText = "Usuario o contraseña incorrecta.";
      } else {
        document.getElementById("msg").innerText = message;
      }
    } else {
      window.location.href = "dashboard.html";
    }
  } catch (err) {
    document.getElementById("msg").innerText = err.message || "Error inesperado en el login.";
  }
}
</script>

</body>
</html>
